  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const Play = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}><polygon points="5,3 19,12 5,21"/></svg>;
    const Square = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}><rect x="3" y="3" width="18" height="18" rx="2"/></svg>;
    const Droplet = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className={className}><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>;
    const RotateCcw = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.95"/></svg>;
    const Activity = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>;
    const Settings2 = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 7h-9"/><path d="M14 17H5"/><circle cx="17" cy="17" r="3"/><circle cx="7" cy="7" r="3"/></svg>;
    const Beaker = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M4.5 3h15"/><path d="M6 3v16a2 2 0 0 0 2 2h8a2 2 0 0 0 2-2V3"/><path d="M6 14h12"/></svg>;
    const Bot = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4"/><line x1="8" y1="16" x2="8" y2="16"/><line x1="16" y1="16" x2="16" y2="16"/></svg>;
    const Sparkles = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/></svg>;
    const X = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
    const Send = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>;
    const FileText = ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>;

    // --- ՄԱԹԵՄԱՏԻԿԱԿԱՆ ԵՎ ՔԻՄԻԱԿԱՆ ՀԱՍՏԱՏՈՒՆՆԵՐ ---
    const Kw = 1.0e-14;
    const pKw = 14.0;
    const Ka_Acetic = 1.8e-5;
    const Kb_Ammonia = 1.8e-5;

    const TITRATION_MODES = {
      SA_SB: { id: 'SA_SB', name: 'Ուժեղ թթու - Ուժեղ հիմք (HCl + NaOH)' },
      SB_SA: { id: 'SB_SA', name: 'Ուժեղ հիմք - Ուժեղ թթու (NaOH + HCl)' },
      WA_SB: { id: 'WA_SB', name: 'Թույլ թթու - Ուժեղ հիմք (CH3COOH + NaOH)' },
      WB_SA: { id: 'WB_SA', name: 'Թույլ հիմք - Ուժեղ թթու (NH3 + HCl)' },
    };

    const INDICATORS = {
      none: { id: 'none', name: 'Առանց ինդիկատորի' },
      phenolphthalein: { id: 'phenolphthalein', name: 'Ֆենոլֆտալեին (pH 8.2 - 10.0)' },
      methylOrange: { id: 'methylOrange', name: 'Մեթիլօրանժ (pH 3.1 - 4.4)' },
      litmus: { id: 'litmus', name: 'Լակմուս (pH 4.5 - 8.3)' },
    };

    // --- ՁԱՅՆԱՅԻՆ ԷՖԵԿՏԻ ԳԵՆԵՐԱՏՈՐ ---
    let sharedAudioCtx = null;
    const getAudioContext = () => {
      if (!sharedAudioCtx) {
        sharedAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
      }
      if (sharedAudioCtx.state === 'suspended') {
        sharedAudioCtx.resume();
      }
      return sharedAudioCtx;
    };

    const playDripSound = () => {
      try {
        const audioCtx = getAudioContext();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sine';
        oscillator.frequency.setValueAtTime(800, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.05);
        gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.05);
      } catch (e) {}
    };

    const playErrorSound = () => {
      try {
        const audioCtx = getAudioContext();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.type = 'sawtooth';
        oscillator.frequency.setValueAtTime(150, audioCtx.currentTime);
        oscillator.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.3);
        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.3);
      } catch (e) {}
    };

    const playBellSound = () => {
      try {
        const audioCtx = getAudioContext();
        const t = audioCtx.currentTime;
        const freqs = [880, 1108.73, 1318.51];
        freqs.forEach((freq, i) => {
          const osc = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(freq, t);
          gain.gain.setValueAtTime(0, t);
          gain.gain.linearRampToValueAtTime(0.15 / (i + 1), t + 0.02);
          gain.gain.exponentialRampToValueAtTime(0.01, t + 1.5 + (i * 0.2));
          osc.connect(gain);
          gain.connect(audioCtx.destination);
          osc.start(t);
          osc.stop(t + 2.5);
        });
      } catch (e) {}
    };

    // --- ԳՈՒՅՆԵՐԻ ԵՎ ՏԻՐՈՒՅԹՆԵՐԻ ՀԱՇՎԱՐԿԻՉ ---
    const getIndicatorColor = (pH, indicator) => {
      const blend = (c1, c2, ratio) => {
        ratio = Math.max(0, Math.min(1, ratio));
        return `rgb(${Math.round(c1[0] + (c2[0] - c1[0]) * ratio)}, 
                    ${Math.round(c1[1] + (c2[1] - c1[1]) * ratio)}, 
                    ${Math.round(c1[2] + (c2[2] - c1[2]) * ratio)})`;
      };
      const colorless = [230, 245, 255];
      if (indicator === 'phenolphthalein') {
        if (pH < 8.2) return `rgb(${colorless.join(',')})`;
        if (pH > 10.0) return 'rgb(255, 0, 127)';
        return blend(colorless, [255, 0, 127], (pH - 8.2) / 1.8);
      }
      if (indicator === 'methylOrange') {
        const red = [255, 40, 40];
        const yellow = [255, 215, 0];
        if (pH < 3.1) return `rgb(${red.join(',')})`;
        if (pH > 4.4) return `rgb(${yellow.join(',')})`;
        return blend(red, yellow, (pH - 3.1) / 1.3);
      }
      if (indicator === 'litmus') {
        const red = [255, 50, 50];
        const blue = [50, 50, 255];
        if (pH < 4.5) return `rgb(${red.join(',')})`;
        if (pH > 8.3) return `rgb(${blue.join(',')})`;
        return blend(red, blue, (pH - 4.5) / 3.8);
      }
      return `rgb(${colorless.join(',')})`;
    };

    const getIndicatorBand = (ind) => {
      switch (ind) {
        case 'phenolphthalein': return { min: 8.2, max: 10.0, color: 'rgba(236, 72, 153, 0.25)', label: '8.2 - 10.0' };
        case 'methylOrange': return { min: 3.1, max: 4.4, color: 'rgba(245, 158, 11, 0.25)', label: '3.1 - 4.4' };
        case 'litmus': return { min: 4.5, max: 8.3, color: 'rgba(168, 85, 247, 0.25)', label: '4.5 - 8.3' };
        default: return null;
      }
    };

    // --- AI (GEMINI API) ԻՆՏԵԳՐԱՑԻԱ ---
    const apiKey = "";

    const callGeminiAPI = async (prompt) => {
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const delay = (ms) => new Promise(res => setTimeout(res, ms));
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: {
          parts: [{ text: "Դուք քիմիայի պրոֆեսոր եք: Օգնում եք աշակերտներին վիրտուալ լաբորատորիայում: Պատասխանեք հայերենով, եղեք քաջալերող, հակիրճ և գիտականորեն ճշգրիտ:" }]
        }
      };
      for (let attempt = 0; attempt < 5; attempt++) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error(`API Error ${res.status}`);
          const data = await res.json();
          return data.candidates?.[0]?.content?.parts?.[0]?.text || "Ներողություն, չկարողացա ձևակերպել պատասխանը:";
        } catch (err) {
          if (attempt === 4) return "⚠️ Ցանցային կամ սերվերի սխալ: Խնդրում ենք փորձել ավելի ուշ:";
          await delay(Math.pow(2, attempt) * 1000);
        }
      }
    };

    const formatAiText = (text) => {
      return text.split('\n').map((line, i) => {
        const bolded = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
        return <p key={i} className="mb-2 text-sm leading-relaxed" dangerouslySetInnerHTML={{ __html: bolded }} />;
      });
    };

    function App() {
      const [mode, setMode] = useState('SA_SB');
      const [indicator, setIndicator] = useState('phenolphthalein');
      const [indicatorError, setIndicatorError] = useState(false);

      const [analyteVol, setAnalyteVol] = useState(25.0);
      const [analyteConc, setAnalyteConc] = useState(0.1);
      const [titrantConc, setTitrantConc] = useState(0.1);

      const [addedVol, setAddedVol] = useState(0.0);
      const [isPlaying, setIsPlaying] = useState(false);
      const [flowRate, setFlowRate] = useState(0.1);

      const [dataPoints, setDataPoints] = useState([]);
      const [currentPH, setCurrentPH] = useState(7.0);

      const [isAiOpen, setIsAiOpen] = useState(false);
      const [aiLoading, setAiLoading] = useState(false);
      const [aiResponse, setAiResponse] = useState("");
      const [aiQuery, setAiQuery] = useState("");
      const [dropAnim, setDropAnim] = useState(false);

      const hasPlayedBell = useRef(false);

      const getRecommendedIndicators = (m) => {
        switch (m) {
          case 'SA_SB': return ['litmus', 'phenolphthalein'];
          case 'SB_SA': return ['litmus', 'methylOrange'];
          case 'WA_SB': return ['phenolphthalein'];
          case 'WB_SA': return ['methylOrange'];
          default: return [];
        }
      };

      useEffect(() => {
        if (indicator === 'none') { setIndicatorError(false); return; }
        const recs = getRecommendedIndicators(mode);
        if (!recs.includes(indicator)) { setIndicatorError(true); playErrorSound(); }
        else { setIndicatorError(false); }
      }, [mode, indicator]);

      const calculatePH = (vAdded) => {
        const Va = parseFloat(analyteVol);
        const Ca = parseFloat(analyteConc);
        const Ct = parseFloat(titrantConc);
        const Vt = parseFloat(vAdded);
        const Vtotal = Va + Vt;
        if (Vtotal === 0) return 7;
        const nAnalyte = Va * Ca;
        const nTitrant = Vt * Ct;
        let calcPH = 7.0;
        switch (mode) {
          case 'SA_SB':
            if (nAnalyte > nTitrant) { const H_conc = (nAnalyte - nTitrant) / Vtotal; calcPH = -Math.log10(H_conc); }
            else if (nTitrant > nAnalyte) { const OH_conc = (nTitrant - nAnalyte) / Vtotal; calcPH = pKw + Math.log10(OH_conc); }
            else calcPH = 7.0;
            break;
          case 'SB_SA':
            if (nAnalyte > nTitrant) { const OH_conc = (nAnalyte - nTitrant) / Vtotal; calcPH = pKw + Math.log10(OH_conc); }
            else if (nTitrant > nAnalyte) { const H_conc = (nTitrant - nAnalyte) / Vtotal; calcPH = -Math.log10(H_conc); }
            else calcPH = 7.0;
            break;
          case 'WA_SB':
            if (Vt === 0) calcPH = 0.5 * (-Math.log10(Ka_Acetic) - Math.log10(Ca));
            else if (nAnalyte > nTitrant) calcPH = -Math.log10(Ka_Acetic) + Math.log10(nTitrant / (nAnalyte - nTitrant));
            else if (Math.abs(nAnalyte - nTitrant) < 1e-6) { const saltConc = nAnalyte / Vtotal; const OH_conc = Math.sqrt((Kw / Ka_Acetic) * saltConc); calcPH = pKw + Math.log10(OH_conc); }
            else { const OH_conc = (nTitrant - nAnalyte) / Vtotal; calcPH = pKw + Math.log10(OH_conc); }
            break;
          case 'WB_SA':
            if (Vt === 0) calcPH = pKw - (0.5 * (-Math.log10(Kb_Ammonia) - Math.log10(Ca)));
            else if (nAnalyte > nTitrant) calcPH = pKw - (-Math.log10(Kb_Ammonia) + Math.log10(nTitrant / (nAnalyte - nTitrant)));
            else if (Math.abs(nAnalyte - nTitrant) < 1e-6) { const saltConc = nAnalyte / Vtotal; const H_conc = Math.sqrt((Kw / Kb_Ammonia) * saltConc); calcPH = -Math.log10(H_conc); }
            else { const H_conc = (nTitrant - nAnalyte) / Vtotal; calcPH = -Math.log10(H_conc); }
            break;
          default: break;
        }
        return Math.max(0, Math.min(14, calcPH));
      };

      useEffect(() => {
        if (addedVol === 0 && dataPoints.length === 0) {
          const initialPH = calculatePH(0);
          setCurrentPH(initialPH);
          setDataPoints([{ v: 0, ph: initialPH }]);
        }
        let interval;
        if (isPlaying) {
          interval = setInterval(() => {
            setAddedVol((prev) => {
              const nextV = prev + parseFloat(flowRate);

                      {[...Array(15)].map((_, i) => (
                        <g key={`h-${i}`}>
                          <line x1={margin.left} y1={margin.top + (i * graphHeight / 14)} x2={svgWidth - margin.right} y2={margin.top + (i * graphHeight / 14)}
                                stroke={i % 2 === 0 ? "#cbd5e1" : "#e2e8f0"} strokeWidth={i % 2 === 0 ? "1.5" : "0.5"} />
                          {i % 2 === 0 && (
                            <text x={margin.left - 8} y={margin.top + graphHeight - (i / 14) * graphHeight + 4} textAnchor="end" fontSize="10" fill="#475569" fontWeight="bold">
                              {i}
                            </text>
                          )}
                        </g>
                      ))}

                      {[...Array(11)].map((_, i) => (
                        <g key={`v-${i}`}>
                          <line x1={margin.left + (i * graphWidth / 10)} y1={margin.top} x2={margin.left + (i * graphWidth / 10)} y2={svgHeight - margin.bottom}
                                stroke={i % 2 === 0 ? "#cbd5e1" : "#e2e8f0"} strokeWidth={i % 2 === 0 ? "1.5" : "0.5"} />
                          <line x1={margin.left + (i * graphWidth / 10)} y1={svgHeight - margin.bottom} x2={margin.left + (i * graphWidth / 10)} y2={svgHeight - margin.bottom + (i%2===0?6:3)}
                                stroke="#475569" strokeWidth="1.5" />
                          {i % 2 === 0 && (
                            <text x={margin.left + (i * graphWidth / 10)} y={svgHeight - margin.bottom + 18} textAnchor="middle" fontSize="11" fill="#475569" fontWeight="bold">
                              {i * 5}
                            </text>
                          )}
                        </g>
                      ))}

                      {indicator !== 'none' && getIndicatorBand(indicator) && (
                        <g className="transition-opacity duration-1000" style={{ opacity: addedVol > 0 ? 1 : 0.5 }}>
                          <rect
                            x={margin.left}
                            y={margin.top + graphHeight - (getIndicatorBand(indicator).max / 14) * graphHeight}
                            width={graphWidth}
                            height={((getIndicatorBand(indicator).max - getIndicatorBand(indicator).min) / 14) * graphHeight}
                            fill={getIndicatorBand(indicator).color}
                            className="animate-pulse"
                            style={{ animationDuration: '3s' }}
                          />
                          <text
                            x={svgWidth - margin.right - 5}
                            y={margin.top + graphHeight - (getIndicatorBand(indicator).max / 14) * graphHeight + 12}
                            textAnchor="end"
                            fontSize="10"
                            fill="#334155"
                            fontWeight="bold"
                            opacity="0.9"
                          >
                            {INDICATORS[indicator].name.split(' ')[0]} ({getIndicatorBand(indicator).label})
                          </text>
                        </g>
                      )}

                      <line x1={margin.left} y1={margin.top} x2={margin.left} y2={svgHeight - margin.bottom} stroke="#334155" strokeWidth="2.5" strokeLinecap="round" />
                      <line x1={margin.left} y1={svgHeight - margin.bottom} x2={svgWidth - margin.right} y2={svgHeight - margin.bottom} stroke="#334155" strokeWidth="2.5" strokeLinecap="round" />

                      <text x={12} y={margin.top + graphHeight / 2} transform={`rotate(-90 12,${margin.top + graphHeight / 2})`} textAnchor="middle" fontSize="13" fill="#1e293b" fontWeight="extrabold">pH Արժեք</text>
                      <text x={margin.left + graphWidth / 2} y={svgHeight - 12} textAnchor="middle" fontSize="13" fill="#1e293b" fontWeight="extrabold">Ավելացված Ծավալ (մլ)</text>

                      {dataPoints.length > 1 && (
                        <polyline
                          points={pointsString}
                          fill="none"
                          stroke="url(#lineGradient)"
                          strokeWidth="3.5"
                          strokeLinejoin="round"
                          strokeLinecap="round"
                          filter="drop-shadow(0px 3px 2px rgba(99, 102, 241, 0.4))"
                        />
                      )}

                      {dataPoints.length > 0 && (
                        <g transform={`translate(${margin.left + (addedVol / 50) * graphWidth}, ${margin.top + graphHeight - (currentPH / 14) * graphHeight})`}>
                          <circle cx="0" cy="0" r="6" fill="#ef4444" stroke="#fff" strokeWidth="2" className="drop-shadow-md" />
                          <circle cx="0" cy="0" r="12" fill="#ef4444" opacity="0.3" className="animate-ping" />
                        </g>
                      )}

                      <defs>
                        <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
                          <stop offset="0%" stopColor="#8b5cf6" />
                          <stop offset="50%" stopColor="#3b82f6" />
                          <stop offset="100%" stopColor="#06b6d4" />
                        </linearGradient>
                      </defs>
                    </svg>
                  </div>
                </div>

              </div>
            </div>

            <button
              onClick={() => setIsAiOpen(true)}
              className={`fixed bottom-6 right-6 p-4 rounded-full bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white shadow-[0_10px_25px_rgba(167,139,250,0.5)] hover:scale-110 transition-transform duration-300 z-50 flex items-center gap-2 group ${isAiOpen ? 'hidden' : 'flex'}`}
            >
              <Bot className="w-6 h-6 animate-bounce" />
              <span className="font-bold hidden group-hover:inline-block truncate transition-all overflow-hidden max-w-[200px]">AI Պրոֆեսոր</span>
              <Sparkles className="w-4 h-4 text-fuchsia-200 absolute top-2 right-2 animate-pulse" />
            </button>

            <div className={`fixed top-0 right-0 h-full w-full sm:w-[400px] bg-white/95 backdrop-blur-xl shadow-[-10px_0_30px_rgba(0,0,0,0.1)] z-50 transform transition-transform duration-500 flex flex-col border-l border-violet-100 ${isAiOpen ? 'translate-x-0' : 'translate-x-full'}`}>
              <div className="bg-gradient-to-r from-violet-600 to-fuchsia-600 p-5 text-white flex justify-between items-center rounded-bl-2xl shadow-md">
                <div className="flex items-center gap-3">
                  <div className="p-2 bg-white/20 rounded-lg">
                    <Bot className="w-6 h-6" />
                  </div>
                  <h2 className="font-bold text-lg">✨ AI Պրոֆեսոր</h2>
                </div>
                <button onClick={() => setIsAiOpen(false)} className="p-1 hover:bg-white/20 rounded-full transition-colors">
                  <X className="w-6 h-6" />
                </button>
              </div>
              <div className="flex-1 overflow-y-auto p-5 flex flex-col gap-4">
                {!aiResponse && !aiLoading && (
                  <div className="bg-violet-50 p-4 rounded-xl border border-violet-100 text-violet-800 text-sm shadow-sm">
                    Ողջու՜յն: Ես ձեր վիրտուալ AI Պրոֆեսորն եմ, որն աշխատում է հզոր <strong>Gemini</strong> մոդելի հիմքի վրա: Ինչպե՞ս կարող եմ օգնել ձեզ տիտրման այս փորձի հարցում:
                  </div>
                )}
                <button
                  onClick={handleGenerateReport}
                  disabled={aiLoading}
                  className="flex items-center justify-center gap-2 w-full py-3 bg-indigo-50 hover:bg-indigo-100 text-indigo-700 border-2 border-indigo-200 rounded-xl font-bold transition-all disabled:opacity-50 hover:shadow-md"
                >
                  <FileText className="w-5 h-5" /> ✨ Գեներացնել Հաշվետվություն
                </button>
                {(aiResponse || aiLoading) && (
                  <div className="bg-slate-50 border border-slate-200 rounded-xl p-4 shadow-inner flex-1 overflow-y-auto mt-2">
                    {aiLoading && !aiResponse ? (
                      <div className="flex flex-col items-center justify-center h-full text-slate-500 gap-3">
                        <div className="w-8 h-8 border-4 border-violet-500 border-t-transparent rounded-full animate-spin"></div>
                        <span className="text-sm font-medium animate-pulse">Gemini-ն վերլուծում է տվյալները...</span>
                      </div>
                    ) : (
                      <div className="text-slate-700">
                        {formatAiText(aiResponse)}
                      </div>
                    )}
                  </div>
                )}
              </div>
              <div className="p-4 border-t border-slate-200 bg-slate-50">
                <div className="relative flex items-center">
                  <input
                    type="text"
                    value={aiQuery}
                    onChange={(e) => setAiQuery(e.target.value)}
                    onKeyDown={(e) => e.key === 'Enter' && handleAskQuestion()}
                    placeholder="Հարցրեք փորձի վերաբերյալ..."
                    className="w-full pl-4 pr-12 py-3 bg-white border border-slate-300 rounded-xl focus:outline-none focus:ring-2 focus:ring-violet-500 focus:border-violet-500 shadow-sm"
                  />
                  <button
                    onClick={handleAskQuestion}
                    disabled={aiLoading || !aiQuery.trim()}
                    className="absolute right-2 p-2 bg-violet-600 hover:bg-violet-700 text-white rounded-lg transition-colors disabled:bg-slate-300"
                  >
                    <Send className="w-4 h-4" />
                  </button>
                </div>
              </div>
            </div>

          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
